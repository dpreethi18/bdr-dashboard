<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inbound Dashboard — Facilio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F2F8;--surface:#fff;--surface2:#F7F8FC;--border:#E4E7F0;
  --text:#0D1117;--text2:#4A5568;--text3:#94A3B8;
  --accent:#5B6AF0;--accent2:#EEF0FE;--brand:#301894;
  --ws:#0891B2;--wsbg:#ECFEFF;
  --bi:#8B5CF6;--bibg:#F5F3FF;
  --r:10px;--r-sm:7px;--sh-lg:0 8px 32px rgba(0,0,0,.12)
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:999}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#app{display:none}

/* TOPBAR */
.topbar{background:var(--brand);height:62px;display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.35)}
.tb-logo{font-size:24px;font-weight:800;color:#fff;letter-spacing:-1.5px;padding-right:16px;border-right:1px solid rgba(255,255,255,.18);margin-right:4px}
.tb-title-wrap{display:flex;flex-direction:column}
.tb-title{font-size:13px;font-weight:700;color:#fff}
.tb-subtitle{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.tb-stats{display:flex;gap:22px;margin-left:auto}
.tb-stat{text-align:right}
.tb-val{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.tb-lbl{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.s-total{color:#fff}.s-ws{color:#67E8F9}.s-bi{color:#C4B5FD}.s-both{color:#FCD34D}


/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:12px 28px;display:flex;flex-direction:column;gap:10px;position:sticky;top:62px;z-index:90}
.tr1{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tr2{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tr3{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:340px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent);background:#fff}
.sort-sel{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:13px;color:var(--text2);background:var(--surface2);outline:none;cursor:pointer}
.count{font-size:12px;color:var(--text3);margin-left:auto;white-space:nowrap}
.flbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--text);border-color:var(--text);color:#fff}
.divider{width:1px;height:20px;background:var(--border);flex-shrink:0}
.owner-sel{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:12px;color:var(--text2);background:var(--surface2);outline:none;cursor:pointer;max-width:200px}

/* GRID */
.main{padding:20px 28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}

/* CARDS */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;transition:all .18s}
.card:hover{border-color:var(--accent);box-shadow:var(--sh-lg);transform:translateY(-2px)}
.card-both{border-color:#8B5CF6;box-shadow:0 0 0 2px rgba(139,92,246,.15)}

.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:8px}
.card-company{font-size:14px;font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0;white-space:nowrap}
.st-new{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}
.st-inprogress{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.st-lto{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.st-other{background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB}

.card-meta{font-size:11px;color:var(--text3);margin-bottom:10px;line-height:1.6}
.card-meta b{color:var(--text2)}

/* SCORE BAR */
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.score-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.score-high{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}
.score-med{background:#FFFBEB;color:#D97706;border:1px solid #FDE68A}
.score-low{background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB}
.score-lbl{font-size:10px;color:var(--text3);font-weight:600}

/* SIGNAL TABS */
.sig-tabs{display:flex;gap:4px;margin-bottom:8px}
.sig-tab{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .15s;font-family:'Inter',sans-serif}
.sig-tab:hover{border-color:var(--accent);color:var(--accent)}
.sig-tab.tab-ws.active{background:var(--wsbg);border-color:#A5F3FC;color:var(--ws)}
.sig-tab.tab-bi.active{background:var(--bibg);border-color:#DDD6FE;color:var(--bi)}
.sig-tab.tab-ct.active{background:var(--accent2);border-color:#C7D2FE;color:var(--accent)}

/* SIGNAL DETAIL PANELS */
.sig-panel{display:none;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-bottom:8px}
.sig-panel.open{display:block}
.sig-panel-ws{border-color:#A5F3FC;background:var(--wsbg)}
.sig-panel-bi{border-color:#DDD6FE;background:var(--bibg)}
.sig-panel-ct{border-color:#C7D2FE;background:var(--accent2)}
.sp-row{display:flex;gap:6px;margin-bottom:5px;font-size:12px;align-items:flex-start}
.sp-key{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);min-width:100px;flex-shrink:0;padding-top:1px}
.sp-val{color:var(--text2);line-height:1.5;word-break:break-all;flex:1}
.sp-mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.sp-divider{border:none;border-top:1px solid rgba(0,0,0,.08);margin:8px 0}
.contact-block{padding:7px 0}
.contact-block+.contact-block{border-top:1px solid rgba(0,0,0,.08)}
.contact-name-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.c-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.c-name{font-size:12px;font-weight:700;color:var(--text)}
.c-detail{font-size:11px;color:var(--text2);margin-bottom:2px;display:flex;gap:5px}
.c-lbl{color:var(--text3);font-weight:600;min-width:80px;flex-shrink:0}
.more-contacts{font-size:11px;color:var(--text3);padding-top:6px;font-style:italic}

.no-sig{font-size:11px;color:var(--text3);font-style:italic;padding:3px 0}

@media(max-width:640px){.topbar,.toolbar,.main{padding-left:16px;padding-right:16px}}

.nav-pills{display:flex;gap:6px;margin-left:12px}
.nav-pill{padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.75);font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;transition:all .15s;font-family:'Inter',sans-serif}
.nav-pill:hover{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.5)}
.nav-pill.active{background:#fff;color:var(--brand);border-color:#fff}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--text3)">Loading inbound leads...</div></div>

<div id="app">
  <div class="topbar">
    <span class="tb-logo">facilio</span>
    <div class="tb-title-wrap">
      <div class="tb-title">Inbound Dashboard</div>
      <div class="tb-subtitle">Website &amp; buyer intent signals</div>
    </div>
    <div class="tb-stats">
      <div class="tb-stat"><div class="tb-val s-total" id="s-total">-</div><div class="tb-lbl">Accounts</div></div>
      <div class="tb-stat"><div class="tb-val s-ws" id="s-ws">-</div><div class="tb-lbl">Web Visitors</div></div>
      <div class="tb-stat"><div class="tb-val s-bi" id="s-bi">-</div><div class="tb-lbl">Buyer Intent</div></div>
      <div class="tb-stat"><div class="tb-val s-both" id="s-both">-</div><div class="tb-lbl">Both Signals</div></div>
    </div>
    <div class='nav-pills'><a class='nav-pill' href='index.html'>🎯 BDR</a><a class='nav-pill' href='deals.html'>💼 Deals</a><a class='nav-pill active' href='inbound.html'>📥 Inbound</a></div>
  </div>

  <div class="toolbar">
    <div class="tr1">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="search" placeholder="Search company, owner, vertical..." oninput="render()">
      </div>
      <select class="sort-sel" id="sort" onchange="render()">
        <option value="signals">Sort: Signals First</option>
        <option value="score">Sort: Intent Score ↓</option>
        <option value="company">Sort: Company A–Z</option>
        <option value="lastAct">Sort: Recent Activity</option>
        <option value="contacts">Sort: Most Contacts</option>
      </select>
      <span class="count" id="count">-</span>
    </div>
    <div class="tr2">
      <span class="flbl">Territory</span><div class="chips" id="territory-chips"></div>
      <div class="divider"></div>
      <span class="flbl">Owner</span>
      <select class="owner-sel" id="owner-sel" onchange="aOwner=this.value;render()">
        <option value="All">All Owners</option>
      </select>
      <div class="divider"></div>
      <span class="flbl">Status</span><div class="chips" id="status-chips"></div>
      <div class="divider"></div>
      <span class="flbl">Signals</span><div class="chips" id="signal-chips"></div>
    </div>
    <div class="tr3">
      <span class="flbl">Vertical</span><div class="chips" id="vertical-chips"></div>
    </div>
  </div>

  <div class="main">
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none"><div style="font-size:36px;margin-bottom:8px">📭</div><div>No accounts match your filters</div></div>
  </div>
</div>

<script>
var DATA=[];
var aTerritory='All', aOwner='All', aStatus='All', aSignal='All', aVertical='All';

function E(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function D(v){
  if(!v||v==='-'||v==='No'||v==='')return '';
  try{
    var d=new Date(v);
    if(isNaN(d.getTime()))return v;
    var dd=String(d.getDate()).padStart(2,'0');
    var mm=String(d.getMonth()+1).padStart(2,'0');
    return dd+'/'+mm+'/'+d.getFullYear();
  }catch(e){return v;}
}

function isPos(v){var x=(v||'').toString().trim().toLowerCase();return x==='yes'||x==='y'||x==='true'||x==='1'||x.indexOf('\u2705')>-1;}
function hasWs(d){return isPos(d.ws);}
function hasBi(d){return isPos(d.bi);}
function initials(fn,ln){return((fn||'').charAt(0)+(ln||'').charAt(0)).toUpperCase()||'?';}

function scoreClass(s){
  var n=parseFloat(s)||0;
  if(n>=6)return 'score-high';
  if(n>=3)return 'score-med';
  return 'score-low';
}

function statusClass(s){
  if(!s)return 'st-other';
  var sl=s.toLowerCase();
  if(sl==='new')return 'st-new';
  if(sl==='lto')return 'st-lto';
  if(sl.indexOf('progress')>-1)return 'st-inprogress';
  return 'st-other';
}

fetch('inbound.json?v='+Date.now())
  .then(function(r){return r.json();})
  .then(function(d){
    DATA=d||[];
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    updateStats();
    buildChips();
    render();
  })
  .catch(function(){
    document.getElementById('loading').innerHTML="<div style='color:#EF4444;font-size:14px;text-align:center;padding:20px'>Failed to load inbound.json<br><button onclick='location.reload()' style='margin-top:12px;padding:8px 20px;background:#5B6AF0;color:#fff;border:none;border-radius:7px;cursor:pointer'>Retry</button></div>";
  });

function updateStats(){
  document.getElementById('s-total').textContent=DATA.length;
  document.getElementById('s-ws').textContent=DATA.filter(hasWs).length;
  document.getElementById('s-bi').textContent=DATA.filter(hasBi).length;
  document.getElementById('s-both').textContent=DATA.filter(function(d){return hasWs(d)&&hasBi(d);}).length;
}

function buildChips(){
  var territories=['All'].concat([...new Set(DATA.map(function(d){return d.territory||'Other';}))].filter(Boolean).sort());
  var statuses=['All'].concat([...new Set(DATA.map(function(d){return d.status;}))].filter(Boolean).sort());
  var verticals=['All'].concat([...new Set(DATA.map(function(d){return d.vertical;}))].filter(Boolean).sort());
  var owners=['All'].concat([...new Set(DATA.map(function(d){return d.owner;}))].filter(Boolean).sort());

  function mk(id,arr,getV,setV){
    var el=document.getElementById(id);el.innerHTML='';
    arr.forEach(function(v){
      var b=document.createElement('button');
      b.className='chip'+(getV()===v?' on':'');
      b.textContent=v;b.dataset.v=v;
      b.onclick=function(){
        setV(v);
        document.querySelectorAll('#'+id+' .chip').forEach(function(c){c.classList.toggle('on',c.dataset.v===v);});
        render();
      };
      el.appendChild(b);
    });
  }

  mk('territory-chips',territories,function(){return aTerritory;},function(v){aTerritory=v;});
  mk('status-chips',statuses,function(){return aStatus;},function(v){aStatus=v;});
  mk('vertical-chips',verticals,function(){return aVertical;},function(v){aVertical=v;});

  // Owner dropdown
  var sel=document.getElementById('owner-sel');sel.innerHTML='';
  owners.forEach(function(o){
    var opt=document.createElement('option');
    opt.value=o;opt.textContent=o==='All'?'All Owners':o;
    if(o===aOwner)opt.selected=true;
    sel.appendChild(opt);
  });

  // Signal chips
  var sigEl=document.getElementById('signal-chips');sigEl.innerHTML='';
  [{k:'All',l:'All'},{k:'ws',l:'🌐 Website'},{k:'bi',l:'🎯 Buyer Intent'},{k:'both',l:'⚡ Both'},{k:'none',l:'No Signals'}].forEach(function(sig){
    var b=document.createElement('button');
    b.className='chip'+(aSignal===sig.k?' on':'');
    b.innerHTML=sig.l;b.dataset.v=sig.k;
    b.onclick=function(){
      aSignal=sig.k;
      document.querySelectorAll('#signal-chips .chip').forEach(function(c){c.classList.toggle('on',c.dataset.v===sig.k);});
      render();
    };
    sigEl.appendChild(b);
  });
}

function getFiltered(){
  var q=document.getElementById('search').value.toLowerCase().trim();
  var sort=document.getElementById('sort').value;
  return DATA.filter(function(d){
    if(aTerritory!=='All'&&(d.territory||'Other')!==aTerritory)return false;
    if(aOwner!=='All'&&d.owner!==aOwner)return false;
    if(aStatus!=='All'&&d.status!==aStatus)return false;
    if(aVertical!=='All'&&(d.vertical||'')!==aVertical)return false;
    if(aSignal==='ws'&&!hasWs(d))return false;
    if(aSignal==='bi'&&!hasBi(d))return false;
    if(aSignal==='both'&&!(hasWs(d)&&hasBi(d)))return false;
    if(aSignal==='none'&&(hasWs(d)||hasBi(d)))return false;
    if(q){
      var hay=(d.company||'').toLowerCase()+(d.owner||'').toLowerCase()+(d.vertical||'').toLowerCase()+(d.territory||'').toLowerCase();
      if(hay.indexOf(q)<0)return false;
    }
    return true;
  }).sort(function(a,b){
    if(sort==='company')return(a.company||'').localeCompare(b.company||'');
    if(sort==='lastAct')return new Date(b.lastAct||0)-new Date(a.lastAct||0);
    if(sort==='contacts')return(b.contacts||[]).length-(a.contacts||[]).length;
    if(sort==='score')return(parseFloat(b.totalScore)||0)-(parseFloat(a.totalScore)||0);
    var sa=(hasWs(a)?2:0)+(hasBi(a)?1:0);
    var sb=(hasWs(b)?2:0)+(hasBi(b)?1:0);
    if(sb!==sa)return sb-sa;
    return(parseFloat(b.totalScore)||0)-(parseFloat(a.totalScore)||0);
  });
}

// Track which panel is open per card
var openPanels={};

function togglePanel(cardId, panel){
  var key=cardId+'_'+panel;
  // Close all panels for this card first
  ['ws','bi','ct'].forEach(function(p){
    var el=document.getElementById(cardId+'_panel_'+p);
    var tab=document.getElementById(cardId+'_tab_'+p);
    if(el){el.classList.remove('open');}
    if(tab){tab.classList.remove('active');}
  });
  // If same panel was open, it's now closed — done
  if(openPanels[cardId]===panel){
    openPanels[cardId]=null;
    return;
  }
  // Open new panel
  openPanels[cardId]=panel;
  var el=document.getElementById(cardId+'_panel_'+panel);
  var tab=document.getElementById(cardId+'_tab_'+panel);
  if(el)el.classList.add('open');
  if(tab)tab.classList.add('active');
}

function render(){
  var list=getFiltered();
  document.getElementById('count').textContent=list.length+' accounts';
  document.getElementById('empty').style.display=list.length?'none':'block';
  var g=document.getElementById('grid');g.innerHTML='';

  list.forEach(function(d,idx){
    var ws=hasWs(d),bi=hasBi(d);
    var cardId='card_'+idx;
    var sc=statusClass(d.status);
    var score=parseFloat(d.totalScore)||0;
    var contacts=d.contacts||[];

    var card=document.createElement('div');
    card.className='card'+(ws&&bi?' card-both':'');
    card.id=cardId;

    // Score badge
    var scoreBadge='';
    if(score>0){
      scoreBadge="<div class='score-row'>"+
        "<span class='score-badge "+scoreClass(score)+"'>&#9889; "+score+"</span>"+
        "<span class='score-lbl'>Overall Intent Score</span>"+
        "</div>";
    }

    // Signal tabs
    var tabsHtml="<div class='sig-tabs'>";
    if(ws){
      tabsHtml+="<button class='sig-tab tab-ws' id='"+cardId+"_tab_ws' onclick='togglePanel(\""+cardId+"\",\"ws\")'>"+
        "🌐 Website"+(d.wsScore?" "+d.wsScore:"")+"</button>";
    }
    if(bi){
      tabsHtml+="<button class='sig-tab tab-bi' id='"+cardId+"_tab_bi' onclick='togglePanel(\""+cardId+"\",\"bi\")'>"+
        "🎯 Buyer Intent"+(d.biScore?" "+d.biScore:"")+"</button>";
    }
    if(contacts.length){
      tabsHtml+="<button class='sig-tab tab-ct' id='"+cardId+"_tab_ct' onclick='togglePanel(\""+cardId+"\",\"ct\")'>"+
        "👥 Contacts ("+contacts.length+")</button>";
    }
    if(!ws&&!bi&&!contacts.length){
      tabsHtml+="<span class='no-sig'>No signals yet</span>";
    }
    tabsHtml+="</div>";

    // Website panel
    var wsPanel="<div class='sig-panel sig-panel-ws' id='"+cardId+"_panel_ws'>";
    if(ws){
      wsPanel+=
        (d.wsScore?"<div class='sp-row'><span class='sp-key'>Score</span><span class='sp-val'><b>"+E(d.wsScore)+"</b> / 5</span></div>":"")+
        (d.wsd&&d.wsd!=='-'?"<div class='sp-row'><span class='sp-key'>Visit Date</span><span class='sp-val'>"+E(D(d.wsd))+"</span></div>":"")+
        (d.wlp?"<div class='sp-row'><span class='sp-key'>Last Page</span><span class='sp-val sp-mono'>"+E(d.wlp)+"</span></div>":"")+
        (d.wtp?"<div class='sp-row'><span class='sp-key'>Total Pages</span><span class='sp-val'>"+E(d.wtp)+"</span></div>":"");
    }
    wsPanel+="</div>";

    // Buyer intent panel
    var biPanel="<div class='sig-panel sig-panel-bi' id='"+cardId+"_panel_bi'>";
    if(bi){
      biPanel+=
        (d.biScore?"<div class='sp-row'><span class='sp-key'>Score</span><span class='sp-val'><b>"+E(d.biScore)+"</b> / 5</span></div>":"")+
        (d.bid&&d.bid!=='-'?"<div class='sp-row'><span class='sp-key'>Intent Date</span><span class='sp-val'>"+E(D(d.bid))+"</span></div>":"<div class='sp-row'><span class='sp-key'>Status</span><span class='sp-val'>Signal detected</span></div>");
    }
    biPanel+="</div>";

    // Contacts panel
    var ctPanel="<div class='sig-panel sig-panel-ct' id='"+cardId+"_panel_ct'>";
    if(contacts.length){
      contacts.slice(0,5).forEach(function(c,ci){
        if(ci>0)ctPanel+="<hr class='sp-divider'>";
        var fullName=((c.firstName||'')+' '+(c.lastName||'')).trim()||'Unknown';
        ctPanel+=
          "<div class='contact-block'>"+
          "<div class='contact-name-row'>"+
            "<div class='c-avatar'>"+initials(c.firstName,c.lastName)+"</div>"+
            "<div class='c-name'>"+E(fullName)+"</div>"+
          "</div>"+
          (c.email?"<div class='c-detail'><span class='c-lbl'>Email</span><span>"+E(c.email)+"</span></div>":"")+
          (c.phone?"<div class='c-detail'><span class='c-lbl'>Phone</span><span>"+E(c.phone)+"</span></div>":"")+
          (c.created?"<div class='c-detail'><span class='c-lbl'>Created</span><span>"+E(c.created)+"</span></div>":"")+
          (c.sourceType?"<div class='c-detail'><span class='c-lbl'>Source Type</span><span>"+E(c.sourceType)+"</span></div>":"")+
          (c.broadSource?"<div class='c-detail'><span class='c-lbl'>Broad Source</span><span>"+E(c.broadSource)+"</span></div>":"")+
          "</div>";
      });
      if(contacts.length>5){
        ctPanel+="<div class='more-contacts'>+"+(contacts.length-5)+" more contacts</div>";
      }
    }
    ctPanel+="</div>";

    card.innerHTML=
      "<div class='card-header'>"+
        "<div class='card-company' title='"+E(d.company)+"'>"+E(d.company)+"</div>"+
        "<span class='status-badge "+sc+"'>"+E(d.status||'—')+"</span>"+
      "</div>"+
      "<div class='card-meta'>"+
        (d.vertical?"<b>"+E(d.vertical)+"</b>"+(d.territory?" &middot; "+E(d.territory):""):"<span>"+E(d.territory||'')+"</span>")+
        "<br>"+E(d.owner||'Unassigned')+
        (d.lastAct?" &middot; "+D(d.lastAct):"")+
      "</div>"+
      scoreBadge+
      tabsHtml+
      wsPanel+
      biPanel+
      ctPanel;

    g.appendChild(card);
  });
}
</script>
</body>
</html>
