<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BDR Intent Dashboard</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer=window.dataLayer||[];
  function gtag(){dataLayer.push(arguments);}
  gtag('js',new Date());
  gtag('config','G-E7KS8ZF493');
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F0F2F8;--surface:#fff;--surface2:#F7F8FC;--border:#E4E7F0;--border2:#CDD2E0;--text:#0D1117;--text2:#4A5568;--text3:#94A3B8;--accent:#5B6AF0;--accent2:#EEF0FE;--brand:#301894;--hot:#EF4444;--hotbg:#FEF2F2;--hotbdr:#FECACA;--warm:#F59E0B;--warmbg:#FFFBEB;--warmbdr:#FDE68A;--cool:#3B82F6;--coolbg:#EFF6FF;--cold:#9CA3AF;--bi:#8B5CF6;--bibg:#F5F3FF;--bibdr:#DDD6FE;--ws:#0891B2;--wsbg:#ECFEFF;--wsbdr:#A5F3FC;--news:#059669;--newsbg:#ECFDF5;--newsbdr:#A7F3D0;--jobs:#D97706;--jobsbg:#FFFBEB;--jobsbdr:#FDE68A;--r:10px;--r-sm:7px;--sh-lg:0 8px 32px rgba(0,0,0,.12)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:999}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#app{display:none}
/* TOPBAR */
.topbar{background:var(--brand);height:62px;display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.35)}
.tb-logo-wrap{display:flex;align-items:center;gap:10px;padding-right:16px;border-right:1px solid rgba(255,255,255,.18);margin-right:4px}
.tb-facilio-logo{display:flex;align-items:center}
.tb-facilio-text{font-size:24px;font-weight:800;color:#fff;letter-spacing:-1.5px;line-height:1}
.tb-title-wrap{display:flex;flex-direction:column}
.tb-title{font-size:13px;font-weight:700;color:#fff}
.tb-subtitle{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.tb-stats{display:flex;gap:22px;margin-left:auto}
.tb-stat{text-align:right}
.tb-val{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.tb-lbl{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.s-total{color:#fff}.s-hot{color:#FCA5A5}.s-warm{color:#FCD34D}.s-jobs{color:#6EE7B7}.s-news{color:#93C5FD}
/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:12px 28px;display:flex;flex-direction:column;gap:10px;position:sticky;top:62px;z-index:90}
.tr1{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tr2{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tr3{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:340px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent);background:#fff}
.sort-sel{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:13px;color:var(--text2);background:var(--surface2);outline:none;cursor:pointer}
.date-input{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:13px;color:var(--text2);background:var(--surface2);outline:none;cursor:pointer}
.date-input:focus{border-color:var(--accent)}
.date-clear{padding:6px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;color:var(--text3);background:var(--surface2);cursor:pointer;font-family:'Inter',sans-serif}
.date-clear:hover{border-color:var(--hot);color:var(--hot)}
.count{font-size:12px;color:var(--text3);margin-left:auto;white-space:nowrap}
.flbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--text);border-color:var(--text);color:#fff}
.chip-bdr.on{background:var(--brand);border-color:var(--brand)}
.chip-geo.on{background:#0F766E;border-color:#0F766E}
.chip-hot.on{background:var(--hot);border-color:var(--hot)}
.chip-warm.on{background:var(--warm);border-color:var(--warm)}
.chip-cool.on{background:var(--cool);border-color:var(--cool)}
.chip-hj.on{background:var(--jobs);border-color:var(--jobs);color:#fff}
.chip-hn.on{background:var(--news);border-color:var(--news);color:#fff}
.chip-hb.on{background:var(--bi);border-color:var(--bi);color:#fff}
.chip-hw.on{background:var(--ws);border-color:var(--ws);color:#fff}
.chip-cat.on{background:#0F766E;border-color:#0F766E;color:#fff}
.divider{width:1px;height:20px;background:var(--border);flex-shrink:0}
.show-hidden-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.show-hidden-btn.on{background:#FEF2F2;border-color:var(--hot);color:var(--hot)}
/* CHART FILTER BANNER */
.chart-filter-banner{display:none;background:#FFF7ED;border-bottom:1.5px solid #FDE68A;padding:10px 28px;align-items:center;gap:10px}
.chart-filter-banner.visible{display:flex}
.cfb-text{font-size:13px;font-weight:600;color:#92400E}
.cfb-clear{padding:5px 14px;border-radius:20px;border:1.5px solid #F59E0B;background:#fff;font-size:12px;font-weight:600;color:#92400E;cursor:pointer;font-family:'Inter',sans-serif}
.cfb-clear:hover{background:#F59E0B;color:#fff}
/* BDR DASHBOARD */
.bdr-dash{background:var(--surface);border-bottom:1.5px solid var(--border);padding:20px 28px 0;display:none}
.bdr-dash.visible{display:block}
.bdr-dash-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.bdr-dash-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.bdr-dash-name{font-size:20px;font-weight:800;color:var(--text)}
.bdr-dash-sub{font-size:12px;color:var(--text3);margin-top:2px}
.bdr-tier-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.bdr-tier-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px;position:relative;overflow:hidden;cursor:pointer;transition:all .15s}
.bdr-tier-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg)}
.bdr-tier-card.active-filter{border-width:2px}
.bdr-tier-bar{position:absolute;top:0;left:0;right:0;height:3px}
.bdr-tier-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.bdr-tier-val{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px}
.bdr-tier-sub{font-size:11px;color:var(--text3)}
.bdr-sig-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.bdr-sig-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;display:flex;align-items:center;gap:10px}
.bdr-sig-icon{font-size:20px}
.bdr-sig-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:2px}
.bdr-sig-count{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace}
.bdr-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* CHARTS */
.bdr-charts-wrap{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:0;padding-bottom:20px}
.bdr-chart-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:16px}
.bdr-chart-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px}
.bdr-chart-sub{font-size:11px;color:var(--text3);margin-bottom:12px}
.chart-canvas-wrap{position:relative;height:220px}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.chart-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.chart-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
/* MAIN */
.main{padding:20px 28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:12px}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
/* CARD */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .18s;position:relative}
.card:hover{border-color:var(--accent);box-shadow:var(--sh-lg);transform:translateY(-2px)}
.card.hidden-card{opacity:.45;border-style:dashed}
.hide-btn{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);font-size:11px;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:all .15s}
.hide-btn:hover{background:var(--hot);border-color:var(--hot);color:#fff}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;padding-right:28px}
.card-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;flex:1;margin-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbadge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0}
.t-hot{background:var(--hotbg);color:var(--hot);border:1px solid var(--hotbdr)}
.t-warm{background:var(--warmbg);color:var(--warm);border:1px solid var(--warmbdr)}
.t-cool{background:var(--coolbg);color:var(--cool);border:1px solid #BFDBFE}
.t-cold{background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB}
.card-meta{font-size:11px;color:var(--text3);margin-bottom:10px;line-height:1.5}
.card-meta b{color:var(--text2)}
.card-foot{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border)}
.bdrtag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bdr-Anjana{background:#FEE2E2;color:#B91C1C}
.bdr-Dheeraj{background:#DBEAFE;color:#1D4ED8}
.bdr-Swathi{background:#D1FAE5;color:#065F46}
.bdr-Nishanth{background:#EDE9FE;color:#6D28D9}
.bdr-Rhythm{background:#FEF3C7;color:#92400E}
.bdr-Aman{background:#FEE2E2;color:#9D174D}
.bdr-Arpita{background:#DBEAFE;color:#1E40AF}
.bdr-Kanishka{background:#D1FAE5;color:#166534}
.bdr-Ojasvi{background:#FEF3C7;color:#78350F}
.bdr-Saeed{background:#EDE9FE;color:#4C1D95}
.bdr-Tushar{background:#E0F2FE;color:#0369A1}
.bdr-Basha{background:#FCE7F3;color:#9D174D}
.bdr-Unassigned{background:#F3F4F6;color:#6B7280}
.sigs{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.sig{padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600}
.sig-bi{background:var(--bibg);color:var(--bi)}
.sig-ws{background:var(--wsbg);color:var(--ws)}
.sig-news{background:var(--newsbg);color:var(--news)}
.sig-jobs{background:var(--jobsbg);color:var(--jobs)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;opacity:0;pointer-events:none;transition:opacity .2s;overflow-y:auto}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:820px;margin:auto;box-shadow:0 24px 80px rgba(0,0,0,.2);overflow:hidden}
.mhead{background:var(--surface);border-bottom:1.5px solid var(--border);padding:20px 24px 0}
.mhead-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.mco{font-size:18px;font-weight:800;color:var(--text);flex:1;margin-right:12px}
.mclose{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.mclose:hover{background:var(--text);color:#fff}
.mmeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;font-size:12px}
.mlinks{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.mlink{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;text-decoration:none;border:1.5px solid var(--border);color:var(--text2);background:var(--surface2);transition:all .15s}
.mlink:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.mtabs{display:flex;overflow-x:auto;border-top:1px solid var(--border)}
.mtab{padding:10px 16px;border:none;background:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap}
.mtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.mbody{padding:20px 24px;max-height:65vh;overflow-y:auto}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.scard{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px;position:relative;overflow:hidden}
.scard-bar{position:absolute;top:0;left:0;right:0;height:3px}
.sl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:4px;margin-bottom:4px}
.sv{font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px}
.sd{font-size:11px;color:var(--text3)}
.pips{display:flex;gap:3px;margin-bottom:4px}
.pip{width:7px;height:7px;border-radius:50%;background:var(--border)}
.sec{margin-bottom:16px}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.iblock{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-bottom:8px}
.irow{display:flex;gap:8px;margin-bottom:5px;font-size:13px}
.ik{color:var(--text3);font-size:11px;font-weight:600;min-width:120px;flex-shrink:0;text-transform:uppercase}
.iv{color:var(--text);font-weight:500;flex:1;word-break:break-word}
.ncard{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px;margin-bottom:8px}
.ntop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:8px}
.ntitle{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;flex:1}
.nscore{font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.nsummary{font-size:12px;color:var(--text2);font-style:italic;padding:6px 10px;background:#fff;border-radius:5px;border-left:2px solid var(--border2);margin-bottom:6px;line-height:1.6}
.narticle{font-size:12px;color:var(--text2);padding:7px 10px;background:#fff;border-radius:5px;border-left:3px solid var(--border2);line-height:1.7;margin-bottom:6px}
.nsigs{display:flex;gap:10px;flex-wrap:wrap;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.jcard{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;gap:10px}
.jinfo{flex:1}
.jtitle{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.3}
.jtags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.jtag{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;background:#F3F4F6;color:#374151}
.jdate{font-size:11px;color:var(--text3);margin-bottom:5px}
.japply{display:inline-flex;align-items:center;padding:5px 12px;background:var(--accent2);border:1.5px solid #C7D2FE;border-radius:6px;font-size:12px;font-weight:600;color:var(--accent);text-decoration:none}
.japply:hover{background:var(--accent);color:#fff}
.jscore{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--jobs);flex-shrink:0}
.tip{padding:9px 13px;border-radius:7px;font-size:13px;margin-bottom:7px;line-height:1.5}
.about-box{font-size:13px;color:var(--text2);line-height:1.7;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:13px;margin-bottom:8px}
.mt-empty{text-align:center;padding:30px;color:var(--text3)}
@media(max-width:640px){.topbar,.toolbar,.main{padding-left:16px;padding-right:16px}.sgrid,.bdr-tier-grid,.bdr-sig-row{grid-template-columns:repeat(2,1fr)}.bdr-charts-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--text3)">Loading...</div></div>
<div id="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-logo-wrap"><span style="font-size:24px;font-weight:800;color:#fff;letter-spacing:-1.5px;font-family:Inter,Arial,sans-serif">facilio</span></div>
  <div class="tb-title-wrap">
    <div class="tb-title">BDR Intent Dashboard</div>
    <div class="tb-subtitle" id="sub">Updated daily</div>
  </div>
  <div class="tb-stats">
    <div class="tb-stat"><div class="tb-val s-total" id="s-total">-</div><div class="tb-lbl">Accounts</div></div>
    <div class="tb-stat"><div class="tb-val s-hot" id="s-hot">-</div><div class="tb-lbl">Hot</div></div>
    <div class="tb-stat"><div class="tb-val s-warm" id="s-warm">-</div><div class="tb-lbl">Warm</div></div>
    <div class="tb-stat"><div class="tb-val s-jobs" id="s-jobs">-</div><div class="tb-lbl">Jobs</div></div>
    <div class="tb-stat"><div class="tb-val s-news" id="s-news">-</div><div class="tb-lbl">News</div></div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="tr1">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="search" placeholder="Search company, vertical, BDR..." oninput="render()">
    </div>
    <select class="sort-sel" id="sort" onchange="render()">
      <option value="is">Sort: Intent Score</option>
      <option value="bi">Sort: Buyer Intent</option>
      <option value="ws">Sort: Website</option>
      <option value="ns">Sort: News</option>
      <option value="js">Sort: Jobs</option>
      <option value="c">Sort: Name</option>
    </select>
    <span class="flbl" style="margin-left:4px">From</span>
    <input type="date" class="date-input" id="date-from" onchange="render()">
    <button class="date-clear" id="date-clear" onclick="clearDate()" style="display:none">&#10005; Clear</button>
    <span class="count" id="count">-</span>
  </div>
  <div class="tr2">
    <span class="flbl">BDR</span><div class="chips" id="bdr-chips"></div>
    <div class="divider"></div>
    <span class="flbl">Geo</span><div class="chips" id="geo-chips"></div>
    <div class="divider"></div>
    <span class="flbl">Signal</span><div class="chips" id="sig-chips"></div>
    <div class="divider"></div>
    <button class="show-hidden-btn" id="show-hidden-btn" onclick="toggleShowHidden()">&#128065; Hidden (<span id="hidden-count">0</span>)</button>
  </div>
  <div class="tr3" id="cat-row" style="display:none">
    <span class="flbl">News Category</span><div class="chips" id="cat-chips"></div>
  </div>
</div>

<!-- CHART FILTER BANNER -->
<div class="chart-filter-banner" id="chart-banner">
  <span class="cfb-text" id="chart-banner-text"></span>
  <button class="cfb-clear" onclick="clearChartFilter()">&#10005; Clear filter</button>
</div>

<!-- BDR PERSONAL DASHBOARD -->
<div class="bdr-dash" id="bdr-dash"></div>

<!-- GRID -->
<div class="main">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none"><div style="font-size:36px;margin-bottom:8px">&#128269;</div><div>No accounts match</div></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mhead">
      <div class="mhead-top"><div class="mco" id="mco"></div><button class="mclose" onclick="closeModal()">&#10005;</button></div>
      <div class="mmeta" id="mmeta"></div>
      <div class="mlinks" id="mlinks"></div>
      <div class="mtabs" id="mtabs"></div>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>
</div>

<script>
var DATA=[], aBdr="All", aGeo="All", aSig="All", aCat="All", cur=null, aTab="overview", showHidden=false;
var chartFilterVert=null, chartFilterTier=null;
var tierChart=null;
var HIDDEN_KEY="bdr_hidden_v1";

var BDR_COLORS={"Anjana":"#B91C1C","Dheeraj":"#1D4ED8","Swathi":"#065F46","Nishanth":"#6D28D9","Rhythm":"#92400E","Aman":"#9D174D","Arpita":"#1E40AF","Kanishka":"#166534","Ojasvi":"#78350F","Saeed":"#4C1D95","Tushar":"#0369A1","Basha":"#9D174D"};

function getHidden(){try{return JSON.parse(localStorage.getItem(HIDDEN_KEY)||"[]");}catch(e){return[];}}
function saveHidden(arr){try{localStorage.setItem(HIDDEN_KEY,JSON.stringify(arr));}catch(e){}}
function isHidden(co){return getHidden().indexOf(co)>-1;}
function toggleHide(co){var h=getHidden();var i=h.indexOf(co);if(i>-1)h.splice(i,1);else h.push(co);saveHidden(h);updateHiddenCount();render();}
function updateHiddenCount(){document.getElementById("hidden-count").textContent=getHidden().length;}
function toggleShowHidden(){showHidden=!showHidden;document.getElementById("show-hidden-btn").classList.toggle("on",showHidden);render();}
function clearDate(){document.getElementById("date-from").value="";document.getElementById("date-clear").style.display="none";render();}
function afterDate(ds,from){if(!from)return true;if(!ds||ds==="-")return false;try{return new Date(ds)>=new Date(from);}catch(e){return false;}}
function getFromDate(){var v=document.getElementById("date-from").value;document.getElementById("date-clear").style.display=v?"inline-block":"none";return v||null;}

function clearChartFilter(){
  chartFilterVert=null;chartFilterTier=null;
  document.getElementById("chart-banner").classList.remove("visible");
  render();
}

fetch("data.json?v="+Date.now())
  .then(function(r){return r.json();})
  .then(function(d){
    DATA=d;
    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("s-total").textContent=DATA.length;
    document.getElementById("s-hot").textContent=DATA.filter(function(x){return x.is>=8;}).length;
    document.getElementById("s-warm").textContent=DATA.filter(function(x){return x.is>=5&&x.is<8;}).length;
    document.getElementById("s-jobs").textContent=DATA.filter(function(x){return x.js>0;}).length;
    document.getElementById("s-news").textContent=DATA.filter(function(x){return x.ns>0;}).length;
    buildChips(); updateHiddenCount(); render();
  })
  .catch(function(){
    document.getElementById("loading").innerHTML="<div style='color:#EF4444;font-size:14px;text-align:center;padding:20px'>Failed to load data.<br><button onclick='location.reload()' style='margin-top:12px;padding:8px 20px;background:#5B6AF0;color:#fff;border:none;border-radius:7px;cursor:pointer'>Retry</button></div>";
  });

function T(s){return s>=8?{l:"Hot "+s,c:"t-hot",k:"hot"}:s>=5?{l:"Warm "+s,c:"t-warm",k:"warm"}:s>=3?{l:"Cool "+s,c:"t-cool",k:"watch"}:{l:"Cold "+s,c:"t-cold",k:"cold"};}
function D(d){if(!d||d==="-")return "-";try{return new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});}catch(e){return d;}}
function P(n,m,c){var h="<div class='pips'>";for(var i=0;i<m;i++)h+="<div class='pip'"+(i<n?" style='background:var(--"+c+")'":"")+"></div>";return h+"</div>";}
function E(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function buildChips(){
  var bdrs=["All"].concat(DATA.map(function(d){return d.b;}).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort());
  var geos=["All"].concat(DATA.map(function(d){return d.g;}).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort());
  var sigs=[{k:"All",l:"All"},{k:"hot",l:"Hot 8+",x:"chip-hot"},{k:"warm",l:"Warm 5-7",x:"chip-warm"},{k:"cool",l:"Watch 3-4",x:"chip-cool"},{k:"hj",l:"Has Jobs",x:"chip-hj"},{k:"hn",l:"Has News",x:"chip-hn"},{k:"hb",l:"Buyer Intent",x:"chip-hb"},{k:"hw",l:"Web Visitors",x:"chip-hw"}];
  var catSet={};
  DATA.forEach(function(d){(d.news||[]).forEach(function(n){var c=(n.signal_type||"").trim();if(c)catSet[c]=true;});});
  var cats=["All"].concat(Object.keys(catSet).sort());

  function mk(id,arr,gV,sV,chipClass){
    arr.forEach(function(item){
      var v=typeof item==="string"?item:item.k,l=typeof item==="string"?item:item.l,x=item.x||(chipClass||"");
      var b=document.createElement("button");
      b.className="chip "+x+(gV()===v?" on":"");
      b.textContent=l;b.dataset.v=v;
      b.onclick=function(){
        sV(v);
        if(id==="bdr-chips"){
          if(typeof gtag!=="undefined")gtag("event","bdr_filter_click",{bdr_name:v});
          clearChartFilter();
          renderBdrDash(v);
        }
        if(id==="sig-chips"){
          var sc=(v==="hn");
          document.getElementById("cat-row").style.display=sc?"flex":"none";
          if(!sc){aCat="All";document.querySelectorAll("#cat-chips .chip").forEach(function(c){c.classList.toggle("on",c.dataset.v==="All");});}
        }
        document.querySelectorAll("#"+id+" .chip").forEach(function(c){c.classList.toggle("on",c.dataset.v===v);});
        render();
      };
      document.getElementById(id).appendChild(b);
    });
  }
  mk("bdr-chips",bdrs,function(){return aBdr;},function(v){aBdr=v;});
  mk("geo-chips",geos,function(){return aGeo;},function(v){aGeo=v;});
  mk("sig-chips",sigs,function(){return aSig;},function(v){aSig=v;});
  mk("cat-chips",cats,function(){return aCat;},function(v){aCat=v;},"chip-cat");
}

// ── BDR PERSONAL DASHBOARD ────────────────────────────────────
function renderBdrDash(bdr){
  var dash=document.getElementById("bdr-dash");
  if(bdr==="All"){dash.classList.remove("visible");dash.innerHTML="";if(tierChart){tierChart.destroy();tierChart=null;}return;}

  var my=DATA.filter(function(d){return d.b===bdr;});
  var hot=my.filter(function(d){return d.is>=8;}).length;
  var warm=my.filter(function(d){return d.is>=5&&d.is<8;}).length;
  var watch=my.filter(function(d){return d.is>=3&&d.is<5;}).length;
  var cold=my.filter(function(d){return d.is<3;}).length;
  var hasNews=my.filter(function(d){return d.ns>0;}).length;
  var hasJobs=my.filter(function(d){return d.js>0;}).length;
  var hasWeb=my.filter(function(d){return d.ws>0;}).length;
  var hasBi=my.filter(function(d){return d.bi>0;}).length;

  var color=BDR_COLORS[bdr]||"#301894";
  var initials=bdr.slice(0,2).toUpperCase();

  var h="<div class='bdr-dash-header'>"
    +"<div class='bdr-dash-avatar' style='background:"+color+"'>"+initials+"</div>"
    +"<div><div class='bdr-dash-name'>"+E(bdr)+"'s Dashboard</div>"
    +"<div class='bdr-dash-sub'>"+my.length+" assigned accounts</div></div>"
    +"</div>";

  // Tier cards
  h+="<div class='bdr-section-title'>Account Tiers</div>";
  h+="<div class='bdr-tier-grid'>"
    +"<div class='bdr-tier-card' onclick='applyChartFilter(null,\"hot\")' style='cursor:pointer'><div class='bdr-tier-bar' style='background:var(--hot)'></div><div class='bdr-tier-label'>Hot</div><div class='bdr-tier-val' style='color:var(--hot)'>"+hot+"</div><div class='bdr-tier-sub'>Score 8+</div></div>"
    +"<div class='bdr-tier-card' onclick='applyChartFilter(null,\"warm\")' style='cursor:pointer'><div class='bdr-tier-bar' style='background:var(--warm)'></div><div class='bdr-tier-label'>Warm</div><div class='bdr-tier-val' style='color:var(--warm)'>"+warm+"</div><div class='bdr-tier-sub'>Score 5–7</div></div>"
    +"<div class='bdr-tier-card' onclick='applyChartFilter(null,\"watch\")' style='cursor:pointer'><div class='bdr-tier-bar' style='background:var(--cool)'></div><div class='bdr-tier-label'>Watch</div><div class='bdr-tier-val' style='color:var(--cool)'>"+watch+"</div><div class='bdr-tier-sub'>Score 3–4</div></div>"
    +"<div class='bdr-tier-card' onclick='applyChartFilter(null,\"cold\")' style='cursor:pointer'><div class='bdr-tier-bar' style='background:var(--border2)'></div><div class='bdr-tier-label'>Cold</div><div class='bdr-tier-val' style='color:var(--text3)'>"+cold+"</div><div class='bdr-tier-sub'>Score 0–2</div></div>"
    +"</div>";

  // Signal summary
  h+="<div class='bdr-section-title'>Signals Active</div>";
  h+="<div class='bdr-sig-row'>"
    +"<div class='bdr-sig-card'><div class='bdr-sig-icon'>&#128240;</div><div><div class='bdr-sig-label'>News</div><div class='bdr-sig-count' style='color:var(--news)'>"+hasNews+"</div></div></div>"
    +"<div class='bdr-sig-card'><div class='bdr-sig-icon'>&#128188;</div><div><div class='bdr-sig-label'>Jobs</div><div class='bdr-sig-count' style='color:var(--jobs)'>"+hasJobs+"</div></div></div>"
    +"<div class='bdr-sig-card'><div class='bdr-sig-icon'>&#127760;</div><div><div class='bdr-sig-label'>Website</div><div class='bdr-sig-count' style='color:var(--ws)'>"+hasWeb+"</div></div></div>"
    +"<div class='bdr-sig-card'><div class='bdr-sig-icon'>&#127919;</div><div><div class='bdr-sig-label'>Buyer Intent</div><div class='bdr-sig-count' style='color:var(--bi)'>"+hasBi+"</div></div></div>"
    +"</div>";

  // Charts
  h+="<div class='bdr-section-title' style='margin-top:4px'>Vertical Breakdown — click any bar segment to filter accounts below</div>";
  h+="<div class='bdr-charts-wrap'>"
    +"<div class='bdr-chart-box'><div class='bdr-chart-title'>By Tier (Hot / Warm / Watch / Cold per vertical)</div><div class='bdr-chart-sub'>Click a bar segment to instantly filter the account grid below</div><div class='chart-canvas-wrap' style='height:260px'><canvas id='tier-chart'></canvas></div>"
    +"<div class='chart-legend'><div class='chart-legend-item'><div class='chart-legend-dot' style='background:#EF4444'></div>Hot</div><div class='chart-legend-item'><div class='chart-legend-dot' style='background:#F59E0B'></div>Warm</div><div class='chart-legend-item'><div class='chart-legend-dot' style='background:#3B82F6'></div>Watch</div><div class='chart-legend-item'><div class='chart-legend-dot' style='background:#D1D5DB'></div>Cold</div></div>"
    +"</div>"
    +"</div>";

  dash.innerHTML=h;
  dash.classList.add("visible");

  // Build chart data
  var vertMap={};
  my.forEach(function(d){
    var v=d.v||"Other";
    if(!vertMap[v])vertMap[v]={hot:0,warm:0,watch:0,cold:0,news:0,jobs:0,web:0,bi:0};
    var m=vertMap[v];
    if(d.is>=8)m.hot++;else if(d.is>=5)m.warm++;else if(d.is>=3)m.watch++;else m.cold++;
    if(d.ns>0)m.news++;
    if(d.js>0)m.jobs++;
    if(d.ws>0)m.web++;
    if(d.bi>0)m.bi++;
  });
  var verts=Object.keys(vertMap).sort(function(a,b){
    var ta=vertMap[a].hot+vertMap[a].warm+vertMap[a].watch+vertMap[a].cold;
    var tb=vertMap[b].hot+vertMap[b].warm+vertMap[b].watch+vertMap[b].cold;
    return tb-ta;
  }).slice(0,10);
  var labels=verts.map(function(v){return v.length>18?v.slice(0,16)+"..":v;});

  // Tier chart
  if(tierChart)tierChart.destroy();
  var tc=document.getElementById("tier-chart");
  if(tc){
    tierChart=new Chart(tc,{
      type:"bar",
      data:{
        labels:labels,
        datasets:[
          {label:"Hot",data:verts.map(function(v){return vertMap[v].hot;}),backgroundColor:"#EF4444",borderRadius:3},
          {label:"Warm",data:verts.map(function(v){return vertMap[v].warm;}),backgroundColor:"#F59E0B",borderRadius:3},
          {label:"Watch",data:verts.map(function(v){return vertMap[v].watch;}),backgroundColor:"#3B82F6",borderRadius:3},
          {label:"Cold",data:verts.map(function(v){return vertMap[v].cold;}),backgroundColor:"#D1D5DB",borderRadius:3}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{title:function(items){return verts[items[0].dataIndex];}}}},
        scales:{x:{stacked:true,ticks:{font:{size:10},maxRotation:35}},y:{stacked:true,ticks:{font:{size:10}}}},
        onClick:function(e,els){
          if(!els.length)return;
          var di=els[0].datasetIndex,ii=els[0].index;
          var tiers=["hot","warm","watch","cold"];
          applyChartFilter(verts[ii],tiers[di]);
        }
      }
    });
  }

  
}

function applyChartFilter(vert,tier){
  chartFilterVert=vert;chartFilterTier=tier;
  var banner=document.getElementById("chart-banner");
  var parts=[];
  if(vert)parts.push("Vertical: "+vert);
  if(tier)parts.push("Tier: "+tier.charAt(0).toUpperCase()+tier.slice(1));
  if(parts.length){
    document.getElementById("chart-banner-text").textContent="Showing — "+parts.join(" · ");
    banner.classList.add("visible");
  } else {
    banner.classList.remove("visible");
  }
  render();
  // Scroll to grid
  setTimeout(function(){document.getElementById("grid").scrollIntoView({behavior:"smooth",block:"start"});},100);
}

function getFiltered(){
  var q=document.getElementById("search").value.toLowerCase().trim();
  var s=document.getElementById("sort").value;
  var from=getFromDate();
  return DATA.filter(function(d){
    if(!showHidden&&isHidden(d.c))return false;
    if(aBdr!=="All"&&d.b!==aBdr)return false;
    if(aGeo!=="All"&&d.g!==aGeo)return false;
    if(q&&d.c.toLowerCase().indexOf(q)<0&&(d.v||"").toLowerCase().indexOf(q)<0&&(d.b||"").toLowerCase().indexOf(q)<0)return false;
    if(aSig==="hot"&&d.is<8)return false;
    if(aSig==="warm"&&(d.is<5||d.is>=8))return false;
    if(aSig==="cool"&&(d.is<3||d.is>=5))return false;
    if(aSig==="hj"&&d.js<=0)return false;
    if(aSig==="hn"&&d.ns<=0)return false;
    if(aSig==="hb"&&d.bi<=0)return false;
    if(aSig==="hw"&&d.ws<=0)return false;
    if(aSig==="hn"&&aCat!=="All"&&!d.news.some(function(n){return(n.signal_type||"").trim()===aCat;}))return false;
    if(from){var ok=afterDate(d.bid,from)||afterDate(d.wsd,from)||d.news.some(function(n){return afterDate(n.dt,from);})||d.jobs.some(function(j){return afterDate(j.posted,from);});if(!ok)return false;}
    // Chart click filters
    if(chartFilterVert&&(d.v||"Other")!==chartFilterVert)return false;
    if(chartFilterTier){
      if(chartFilterTier==="hot"&&d.is<8)return false;
      if(chartFilterTier==="warm"&&(d.is<5||d.is>=8))return false;
      if(chartFilterTier==="watch"&&(d.is<3||d.is>=5))return false;
      if(chartFilterTier==="cold"&&d.is>=3)return false;
    }
    return true;
  }).sort(function(a,b){if(s==="c")return a.c.localeCompare(b.c);return(b[s]||0)-(a[s]||0);});
}

function render(){
  var list=getFiltered();
  document.getElementById("count").textContent=list.length+" accounts";
  document.getElementById("empty").style.display=list.length?"none":"block";
  var g=document.getElementById("grid");g.innerHTML="";
  list.forEach(function(d){
    var t=T(d.is),sigs="",hidden=isHidden(d.c);
    if(d.bi>0)sigs+="<span class='sig sig-bi'>&#127919; "+d.bi+"</span>";
    if(d.ws>0)sigs+="<span class='sig sig-ws'>&#127760; "+d.ws+"</span>";
    if(d.ns>0)sigs+="<span class='sig sig-news'>&#128240; "+d.ns+"</span>";
    if(d.js>0)sigs+="<span class='sig sig-jobs'>&#128188; "+d.jobs.length+"</span>";
    var c=document.createElement("div");
    c.className="card"+(hidden?" hidden-card":"");
    c.innerHTML="<button class='hide-btn' title='"+(hidden?"Unhide":"Hide")+"' onclick='event.stopPropagation();toggleHide(\""+E(d.c)+"\")'>"+( hidden?"&#8635;":"&#10005;")+"</button>"
      +"<div class='card-top'><div class='card-name' title='"+E(d.c)+"'>"+E(d.c)+"</div><div class='tbadge "+t.c+"'>"+t.l+"</div></div>"
      +"<div class='card-meta'>"+(d.v?"<b>"+E(d.v)+"</b> &middot; ":"")+d.g+"</div>"
      +"<div class='card-foot'><span class='bdrtag bdr-"+d.b+"'>"+d.b+"</span></div>"
      +(sigs?"<div class='sigs'>"+sigs+"</div>":"");
    c.onclick=function(){if(!hidden)openModal(d);};
    g.appendChild(c);
  });
}

function openModal(d){
  cur=d;aTab="overview";
  var t=T(d.is);
  document.getElementById("mco").textContent=d.c;
  document.getElementById("mmeta").innerHTML="<span class='tbadge "+t.c+"'>"+t.l+"</span><span class='bdrtag bdr-"+d.b+"'>"+d.b+"</span><span style='color:var(--text3)'>"+d.g+"</span>"+(d.v?"<span style='color:var(--text3)'>"+E(d.v)+"</span>":"");
  var lk="";
  if(d.w){var hw=d.w.indexOf("http")===0?d.w:"https://"+d.w;lk+="<a class='mlink' href='"+hw+"' target='_blank'>&#127760; Website</a>";}
  if(d.li){var hl=d.li.indexOf("http")===0?d.li:"https://"+d.li;lk+="<a class='mlink' href='"+hl+"' target='_blank'>LinkedIn</a>";}
  document.getElementById("mlinks").innerHTML=lk;
  buildTabs();renderTab();
  document.getElementById("overlay").classList.add("open");document.body.style.overflow="hidden";
}

function buildTabs(){
  var d=cur;
  var tabs=[{id:"overview",l:"Overview"},{id:"buyer",l:"Buyer Intent"},{id:"website",l:"Website"+(d.tp>0?" ("+d.tp+"p)":"")},{id:"news",l:"News ("+d.news.length+")"},{id:"jobs",l:"Jobs ("+d.jobs.length+")"}];
  if(d.abt||d.svc)tabs.push({id:"about",l:"About"});
  document.getElementById("mtabs").innerHTML=tabs.map(function(t){return "<button class='mtab"+(t.id===aTab?" on":"")+"' data-id='"+t.id+"' onclick='switchTab(\""+t.id+"\")'>"+t.l+"</button>";}).join("");
}

function switchTab(t){aTab=t;document.querySelectorAll(".mtab").forEach(function(el){el.classList.toggle("on",el.dataset.id===t);});renderTab();}

function renderTab(){
  var d=cur,h="";
  if(aTab==="overview"){
    h="<div class='sgrid'>"
     +"<div class='scard'><div class='scard-bar' style='background:var(--bi)'></div><div class='sl'>Buyer Intent</div><div class='sv' style='color:"+(d.bi>0?"var(--bi)":"var(--border2)")+"'>"+d.bi+"</div>"+P(d.bi,5,"bi")+"<div class='sd'>"+(d.bid&&d.bid!=="-"?"&#128197; "+D(d.bid):"No signal")+"</div></div>"
     +"<div class='scard'><div class='scard-bar' style='background:var(--ws)'></div><div class='sl'>Website</div><div class='sv' style='color:"+(d.ws>0?"var(--ws)":"var(--border2)")+"'>"+d.ws+"</div>"+P(Math.round(d.ws),5,"ws")+"<div class='sd'>"+(d.tp>0?d.tp+" pages":(d.wsd&&d.wsd!=="-"?"&#128197; "+D(d.wsd):"No visits"))+"</div></div>"
     +"<div class='scard'><div class='scard-bar' style='background:var(--news)'></div><div class='sl'>News</div><div class='sv' style='color:"+(d.ns>0?"var(--news)":"var(--border2)")+"'>"+d.ns+"</div>"+P(Math.round(d.ns),6,"news")+"<div class='sd'>"+d.news.length+" articles</div></div>"
     +"<div class='scard'><div class='scard-bar' style='background:var(--jobs)'></div><div class='sl'>Jobs</div><div class='sv' style='color:"+(d.js>0?"var(--jobs)":"var(--border2)")+"'>"+d.js+"</div>"+P(Math.round(d.js),5,"jobs")+"<div class='sd'>"+d.jobs.length+" roles</div></div>"
     +"</div>";
    if(d.bi>0)h+="<div class='sec'><div class='sec-title'>Buyer Intent</div><div class='iblock'><div class='irow'><span class='ik'>Score</span><span class='iv' style='color:var(--bi);font-weight:700'>"+d.bi+"/5</span></div>"+(d.bid&&d.bid!=="-"?"<div class='irow'><span class='ik'>Date</span><span class='iv'>"+D(d.bid)+"</span></div>":"")+(d.bi>=4?"<div style='margin-top:8px;padding:9px 12px;background:var(--bibg);border-radius:7px;border-left:3px solid var(--bi);font-size:13px;color:var(--bi);font-weight:600'>Very high intent - reach out now</div>":"")+"</div></div>";
    if(d.ws>0)h+="<div class='sec'><div class='sec-title'>Website Signal</div><div class='iblock'><div class='irow'><span class='ik'>Score</span><span class='iv' style='color:var(--ws);font-weight:700'>"+d.ws+"/5</span></div>"+(d.tp>0?"<div class='irow'><span class='ik'>Pages</span><span class='iv'>"+d.tp+"</span></div>":"")+(d.wsd&&d.wsd!=="-"?"<div class='irow'><span class='ik'>Visit Date</span><span class='iv'>"+D(d.wsd)+"</span></div>":"")+(d.lp?"<div class='irow'><span class='ik'>Last Page</span><span class='iv' style='font-family:monospace;font-size:11px'>"+E(d.lp.split(";")[0])+"</span></div>":"")+"</div></div>";
    if(d.news.length>0)h+="<div class='sec'><div class='sec-title'>Top News</div>"+NC(d.news[0],true)+(d.news.length>1?"<div style='font-size:12px;color:var(--text3);text-align:center;margin-top:6px'>+"+(d.news.length-1)+" more in News tab</div>":"")+"</div>";
    if(d.jobs.length>0)h+="<div class='sec'><div class='sec-title'>Top Job</div>"+JC(d.jobs[0])+(d.jobs.length>1?"<div style='font-size:12px;color:var(--text3);text-align:center;margin-top:6px'>+"+(d.jobs.length-1)+" more in Jobs tab</div>":"")+"</div>";
    var tips=[];
    if(d.bi>=4)tips.push("<div class='tip' style='background:var(--bibg);color:var(--bi);border-left:3px solid var(--bi)'>&#127919; Very high buyer intent - reach out immediately</div>");
    else if(d.bi>0)tips.push("<div class='tip' style='background:var(--bibg);color:#6D28D9;border-left:3px solid var(--bibdr)'>&#127919; Buyer intent detected "+D(d.bid)+"</div>");
    if(d.ws>0&&d.lp)tips.push("<div class='tip' style='background:var(--wsbg);color:var(--ws);border-left:3px solid var(--wsbdr)'>&#127760; Visited "+E(d.lp.split(";")[0])+" - reference in outreach</div>");
    if(d.js>3)tips.push("<div class='tip' style='background:var(--jobsbg);color:var(--jobs);border-left:3px solid var(--jobsbdr)'>&#128188; Hiring multiple roles - use as outreach hook</div>");
    if(!tips.length)tips.push("<div class='tip' style='background:var(--surface2);color:var(--text3);border-left:3px solid var(--border)'>Low signals - consider nurture sequence</div>");
    h+="<div class='sec'><div class='sec-title'>Outreach Angles</div>"+tips.join("")+"</div>";
  }
  else if(aTab==="buyer"){
    if(!d.bi)h="<div class='mt-empty'><div style='font-size:32px;margin-bottom:8px'>&#128237;</div>No buyer intent signals</div>";
    else h="<div class='sec'><div class='sec-title'>Buyer Intent</div><div class='iblock'><div class='irow'><span class='ik'>Score</span><span class='iv' style='color:var(--bi);font-size:20px;font-weight:800'>"+d.bi+" / 5</span></div>"+P(d.bi,5,"bi")+(d.bid&&d.bid!=="-"?"<div class='irow'><span class='ik'>Date</span><span class='iv' style='font-weight:700'>"+D(d.bid)+"</span></div>":"")+"</div>"+(d.bi>=4?"<div style='padding:12px;background:var(--bibg);border-radius:8px;border-left:4px solid var(--bi)'><b style='color:var(--bi)'>Very High Buyer Intent</b><div style='font-size:13px;color:var(--text2);margin-top:4px'>Actively evaluating solutions. Prioritise this week.</div></div>":"")+"</div>";
  }
  else if(aTab==="website"){
    if(!d.ws&&!d.tp)h="<div class='mt-empty'><div style='font-size:32px;margin-bottom:8px'>&#128237;</div>No website visitor data</div>";
    else h="<div class='sec'><div class='sec-title'>Website Visitors</div><div class='iblock'>"+(d.wsd&&d.wsd!=="-"?"<div class='irow'><span class='ik'>Visit Date</span><span class='iv'>"+D(d.wsd)+"</span></div>":"")+(d.tp?"<div class='irow'><span class='ik'>Pages Viewed</span><span class='iv'>"+d.tp+"</span></div>":"")+(d.lp?"<div class='irow'><span class='ik'>Last Page</span><span class='iv' style='font-family:monospace;font-size:11px'>"+E(d.lp.split(";")[0])+"</span></div>":"")+"<div class='irow'><span class='ik'>Score</span><span class='iv' style='color:var(--ws);font-weight:700'>"+d.ws+"/5</span></div></div></div>";
  }
  else if(aTab==="news"){
    if(!d.news.length)h="<div class='mt-empty'><div style='font-size:32px;margin-bottom:8px'>&#128237;</div>No news signals</div>";
    else{h="<div style='font-size:12px;color:var(--text3);margin-bottom:10px'>"+d.news.length+" signals found</div>";d.news.forEach(function(n){h+=NC(n,false);});}
  }
  else if(aTab==="jobs"){
    if(!d.jobs.length)h="<div class='mt-empty'><div style='font-size:32px;margin-bottom:8px'>&#128237;</div>No job postings</div>";
    else{h="<div style='font-size:12px;color:var(--text3);margin-bottom:10px'>"+d.jobs.length+" roles found</div>";d.jobs.forEach(function(j){h+=JC(j);});}
  }
  else if(aTab==="about"){
    if(d.abt)h+="<div class='sec'><div class='sec-title'>About</div><div class='about-box'>"+E(d.abt)+"</div></div>";
    if(d.svc)h+="<div class='sec'><div class='sec-title'>Services</div><div class='about-box'>"+E(d.svc)+"</div></div>";
  }
  document.getElementById("mbody").innerHTML=h;
  document.getElementById("mbody").scrollTop=0;
}

function NC(n,mini){
  var sc=parseInt(n.score||0),scC=sc>=5?"var(--hot)":sc>=3?"var(--warm)":"var(--text3)";
  var h="<div class='ncard'><div class='ntop'><div class='ntitle'>"+E(n.title||"Untitled")+"</div><div class='nscore' style='color:"+scC+"'>"+n.score+"</div></div>";
  if(n.dt&&n.dt!=="-")h+="<div style='font-size:11px;color:var(--text3);margin-bottom:6px'>&#128197; "+D(n.dt)+"</div>";
  if(n.signal_type)h+="<div style='display:inline-block;padding:2px 8px;border-radius:4px;background:var(--newsbg);color:var(--news);font-size:11px;font-weight:600;margin-bottom:6px'>"+E(n.signal_type)+"</div>";
  if(n.summary)h+="<div class='nsummary'>"+E(n.summary)+"</div>";
  if(n.article&&!mini)h+="<div class='narticle'>"+E(n.article.slice(0,300))+"</div>";
  if(!mini&&n.signal_strength)h+="<div class='nsigs'><span><b>Strength:</b> "+E(n.signal_strength)+"</span></div>";
  return h+"</div>";
}

function JC(j){
  return "<div class='jcard'><div class='jinfo'><div class='jtitle'>"+E(j.title)+"</div><div class='jtags'><span class='jtag'>"+E(j.location)+"</span><span class='jtag'>"+E(j.seniority)+"</span></div><div class='jdate'>Posted: "+(j.posted||"-")+"</div>"+(j.url?"<a class='japply' href='"+E(j.url)+"' target='_blank' rel='noopener'>Apply &#8599;</a>":"")+"</div><div class='jscore'>"+j.score+"</div></div>";
}

function closeModal(){document.getElementById("overlay").classList.remove("open");document.body.style.overflow="";}
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});
</script>
</body>
</html>
